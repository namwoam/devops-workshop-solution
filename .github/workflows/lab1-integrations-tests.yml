name: Lab1 Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
    - 'lab1/**'
    - '.github/workflows/lab1-integrations-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
    - 'lab1/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: |
        cd lab1
        poetry install --no-root

    - name: Run integration tests
      run: |
        cd lab1
        poetry run pytest -v --tb=short
      env:
        PYTHONPATH: ..

    - name: Generate coverage report
      run: |
        cd lab1
        poetry run pytest -v --cov=lib --cov-report=xml
      env:
        PYTHONPATH: ..
      if: always()

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./lab1/coverage.xml
        flags: lab1
      if: always()

name: Lab3 Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
    - 'lab3/**'
    - '.github/workflows/lab3-integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
    - 'lab3/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
        - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        pip install psycopg2-binary

    - name: Install dependencies
      run: |
        cd lab3
        poetry install

    - name: Wait for PostgreSQL
      run: |
        python -c "
        import psycopg2
        import time
        for i in range(30):
            try:
                conn = psycopg2.connect(
                    host='localhost',
                    port=5432,
                    database='testdb',
                    user='postgres',
                    password='postgres'
                )
                conn.close()
                print('Database is ready!')
                break
            except psycopg2.OperationalError:
                print(f'Attempt {i+1}/30: Waiting for database...')
                time.sleep(1)
        "
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: testdb
        DB_USER: postgres
        DB_PASSWORD: postgres

    - name: Run integration tests
      run: |
        cd lab3
        poetry run pytest -v --tb=short
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: testdb
        DB_USER: postgres
        DB_PASSWORD: postgres

    - name: Generate coverage report
      run: |
        cd lab3
        poetry run pytest -v --cov=user --cov-report=xml
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: testdb
        DB_USER: postgres
        DB_PASSWORD: postgres
      if: always()

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./lab3/coverage.xml
        flags: lab3
      if: always()

name: Lab4 Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
    - 'lab4/**'
    - '.github/workflows/lab4-integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
    - 'lab4/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: lab4/package-lock.json

    - name: Install dependencies
      run: |
        cd lab4
        npm ci

    - name: Install Playwright browsers
      run: |
        cd lab4
        npx playwright install --with-deps chromium

    - name: Build
      run: |
        cd lab4
        npm run build

    - name: Run integration tests
      run: |
        cd lab4
        npm run test:e2e

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lab4-playwright-report
        path: lab4/playwright-report/
        retention-days: 30

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        path: lab4/dist

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
